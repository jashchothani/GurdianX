{% extends 'base2.html' %}
{% block title %}Forgot Password{% endblock %}
{% block extra_head %}
<style>
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background:radial-gradient(circle at 20% 20%, #1f1b3a, #0f0e17 60%);
  overflow:hidden;
}

/* Animated background glow */
body::before{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(109,40,217,0.4), transparent);
  top:-120px;
  left:-120px;
  filter:blur(90px);
  animation:floatBg 10s ease-in-out infinite alternate;
}
@keyframes floatBg{
  to{transform:translate(120px,80px);}
}

.auth-wrap{
  width:100%;
  max-width:420px;
  padding:24px;
  animation:fadeUp .6s ease;
}

.auth-card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  padding:42px;
  box-shadow:0 25px 80px rgba(0,0,0,.6);
  position:relative;
  overflow:hidden;
}

/* Gradient border effect */
.auth-card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:24px;
  padding:1px;
  background:linear-gradient(135deg,#6d28d9,#9333ea,#4f46e5);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  opacity:.4;
}

.auth-logo{
  width:74px;
  height:74px;
  background:linear-gradient(135deg,#6d28d9,#9333ea);
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.9rem;
  margin:0 auto 24px;
  box-shadow:0 10px 40px rgba(109,40,217,0.6);
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  50%{transform:translateY(-8px);}
}

.auth-title{
  font-size:1.6rem;
  font-weight:800;
  color:#fff;
  text-align:center;
}

.auth-sub{
  font-size:.9rem;
  color:#aaa;
  text-align:center;
  margin:12px 0 32px;
  line-height:1.6;
}

/* Form styling */
.form-group{
  margin-bottom:20px;
  position:relative;
}

.form-label{
  font-size:.75rem;
  color:#aaa;
  margin-bottom:6px;
  display:block;
}

/* Inputs + select */
.form-control{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
  transition:.3s;
  font-size:.9rem;
}

.form-control:focus{
  border-color:#9333ea;
  box-shadow:0 0 20px rgba(147,51,234,0.5);
  outline:none;
  transform:scale(1.02);
}

/* Button */
.btn-primary{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#6d28d9,#9333ea);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.btn-primary::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:-100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:.5s;
}

.btn-primary:hover::before{
  left:100%;
}

.btn-primary:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 40px rgba(147,51,234,0.5);
}

/* Back link */
.back-link{
  text-align:center;
  margin-top:22px;
  font-size:.82rem;
}

.back-link a{
  color:#c4b5fd;
  font-weight:600;
  text-decoration:none;
  transition:.3s;
}

.back-link a:hover{
  color:#fff;
  text-shadow:0 0 10px rgba(147,51,234,0.8);
}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <div class="auth-title">Forgot Password</div>
    <div class="auth-sub">Enter your registered email and we'll send you an OTP to reset your password.</div>
    <form method="POST" action="/forgot-password">
      <div class="form-group">
        <label class="form-label">Portal</label>
        <select name="portal" class="form-control" required>
          <option value="student">🎓 Student</option>
          <option value="parent">👨‍👩‍👧 Parent</option>
          <option value="staff">🏫 Staff / Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Registered Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@gmail.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">
        <i class="fa-solid fa-paper-plane"></i> Send Reset OTP
      </button>
    </form>
    <div class="back-link mt-2"><a href="/login">← Back to Login</a></div>
  </div>
</div>
<script>
document.querySelectorAll('.form-control').forEach(input=>{
  input.addEventListener('focus',()=>{
    input.parentElement.style.transform = "translateY(-2px)";
  });
  input.addEventListener('blur',()=>{
    input.parentElement.style.transform = "translateY(0)";
  });
});
</script>
{% endblock %}
